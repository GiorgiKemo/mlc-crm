                              <span>{photo.date}</span>
                              <span style={{ fontSize: 8, padding: "1px 5px", background: "#2D5A2715", borderRadius: 4, color: "#2D5A27", fontWeight: 600 }}>{photo.type}</span>
                            </div>

                          <button onClick={(e) => { e.stopPropagation(); removePhoto(c.id, photo.id); }}

                        </div>
                      ))}
                      {/* Add photo placeholder */}

                        style={{ borderRadius: 10, border: "2px dashed #D1D5DB", height: 130, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", gap: 6, transition: "all 0.15s" }}

                        onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#D1D5DB"; e.currentTarget.style.background = "transparent"; }}>
                        <Icon name="plus" size={20} color="#9CA3AF" />

                      </div>

                    <div onClick={() => document.getElementById("photo-upload-" + c.id)?.click()}

                </div>

        </div>

      const renderFinanceTab = () => {
        const projectSummaries = clients.filter((c) => c.estimateTotal > 0).map((c) => {
          const hours = timesheets.filter((ts) => ts.projectId === c.projectId).reduce((s, ts) => s + ts.hours, 0);
          const laborCost = hours * 45;
          const materialCost = c.tasks.reduce((s, t) => s + t.cost * 0.4, 0);
          const profit = c.paidAmount - laborCost - materialCost;
          const margin = c.paidAmount > 0 ? (profit / c.paidAmount) * 100 : 0;
          return { ...c, hours, laborCost, materialCost, profit, margin };
        });

          revenue: projectSummaries.reduce((s, p) => s + p.paidAmount, 0),
          totalEstimated: projectSummaries.reduce((s, p) => s + p.estimateTotal, 0),
          totalLabor: projectSummaries.reduce((s, p) => s + p.laborCost, 0),
          totalMaterials: projectSummaries.reduce((s, p) => s + p.materialCost, 0),
          totalProfit: projectSummaries.reduce((s, p) => s + p.profit, 0),
          totalHours: projectSummaries.reduce((s, p) => s + p.hours, 0),

                    <div style={{ width: (seasonTotals.totalMaterials / seasonTotals.totalEstimated * 100) + "%", background: "#F59E0B", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 10, fontWeight: 700, minWidth: 30 }}>Materials</div>
                    <div style={{ flex: 1, background: "#10B981", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 10, fontWeight: 700 }}>Profit</div>

                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>

                              return (
                                <div key={msg.id} style={{ display: "flex", justifyContent: isOutbound ? "flex-end" : "flex-start", marginBottom: 12 }}>
                                  <div style={{ maxWidth: "78%", minWidth: 180 }}>
                                    {/* Message header */}
                                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, justifyContent: isOutbound ? "flex-end" : "flex-start" }}>
                                      {!isOutbound && <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#D4A84320", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: "#D4A843" }}>{fu.clientName.charAt(0)}</div>}
                                      <span style={{ fontSize: 10, color: "#9CA3AF" }}>
                                        {isOutbound ? "MLC Team" : fu.clientName} · {channelIcon} {msg.channel} · {msg.date} {msg.time}
                                      </span>
                                      {isAutoStep && <span style={{ fontSize: 8, padding: "1px 5px", background: channelColor + "15", color: channelColor, borderRadius: 4, fontWeight: 700 }}>AUTO</span>}
                                      {!isOutbound && <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#2D5A2715", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name="arrow" size={10} color="#2D5A27" /></div>}
                                    </div>
                                    {/* Message bubble */}
                                    <div style={{
                                      padding: "10px 14px", borderRadius: 12, fontSize: 13, lineHeight: 1.6, whiteSpace: "pre-line",
                                      background: isOutbound ? "#2D5A27" : "#fff",
                                      color: isOutbound ? "#fff" : "#374151",
                                      border: isOutbound ? "none" : "1px solid #E5E7EB",
                                      borderTopRightRadius: isOutbound ? 4 : 12,
                                      borderTopLeftRadius: isOutbound ? 12 : 4,
                                    }}>
                                      {msg.subject && <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 4, opacity: isOutbound ? 0.8 : 1, color: isOutbound ? "#BBF7D0" : "#111827" }}>Subject: {msg.subject}</div>}
                                      {msg.body}
                                    </div>
                                    {/* Delivery status for outbound */}
                                    {isOutbound && (
                                      <div style={{ textAlign: "right", marginTop: 3, fontSize: 10, color: "#9CA3AF" }}>
                                        {msg.status === "delivered" ? "✓✓ Delivered" : msg.status === "sent" ? "✓ Sent" : msg.status === "failed" ? "✕ Failed" : "⏳ Pending"}
                                      </div>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>

                          {/* Next Auto Step Preview */}
                          {isActive && !isCompleted && (() => {
                            const currentStepIdx = fu.completedSteps.length + fu.skippedSteps.length;
                            const currentStep = followUpSequence[currentStepIdx];
                            if (!currentStep) return null;
                            const channelIcon = currentStep.channel === "Email" ? "📧" : currentStep.channel === "SMS" ? "📱" : "📞";
                            const msg = currentStep.message ? currentStep.message.replace(/\{name\}/g, fu.clientName).replace(/\{total\}/g, formatCurrency(fu.estimateTotal)).replace(/\{address\}/g, client?.address || "") : null;
                            return (
                              <div style={{ padding: "10px 16px", background: "#FFFBEB", borderTop: "1px solid #FDE68A" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                                  <div style={{ fontSize: 12, fontWeight: 700, color: "#92400E" }}>{channelIcon} Next Auto: {currentStep.label} <span style={{ fontWeight: 400 }}>· Day {currentStep.delay}</span></div>
                                  <div style={{ fontSize: 11, color: "#92400E" }}>{fu.nextAction ? formatDate(fu.nextAction) : ""}</div>
                                </div>
                                {msg && <div style={{ padding: 8, background: "#fff", borderRadius: 8, fontSize: 11, color: "#92400E", lineHeight: 1.5, maxHeight: 60, overflowY: "auto", border: "1px solid #FDE68A", whiteSpace: "pre-line", marginBottom: 6 }}>{msg}</div>}
                                <div style={{ display: "flex", gap: 6 }}>
                                  <Btn size="sm" icon="send" onClick={() => advanceFollowUp(fu.id, currentStep.id, "complete")}>{currentStep.auto ? "Send Now" : "Mark Done"}</Btn>
                                  <Btn size="sm" variant="secondary" onClick={() => advanceFollowUp(fu.id, currentStep.id, "skip")}>Skip</Btn>
                                </div>
                              </div>
                            );
                          })()}

                          {/* Reply Composer */}
                          <div style={{ padding: "12px 16px", background: "#fff", borderTop: "1px solid #E5E7EB" }}>
                            <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
                              <div style={{ flex: 1 }}>
                                <div style={{ display: "flex", gap: 4, marginBottom: 6 }}>
                                  {["SMS", "Email"].map(ch => (
                                    <button key={ch} onClick={() => setReplyChannel(ch)}
                                      style={{ padding: "3px 10px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", border: replyChannel === ch ? "1.5px solid #2D5A27" : "1px solid #D1D5DB", background: replyChannel === ch ? "#2D5A2710" : "#fff", color: replyChannel === ch ? "#2D5A27" : "#6B7280", fontFamily: "'DM Sans', sans-serif" }}>
                                      {ch === "SMS" ? "📱" : "📧"} {ch}
                                    </button>
                                  ))}
                                  <button onClick={() => simulateInboundReply(fu.id)}
                                    style={{ marginLeft: "auto", padding: "3px 10px", borderRadius: 6, fontSize: 10, fontWeight: 600, cursor: "pointer", border: "1px solid #D1D5DB", background: "#F9FAFB", color: "#9CA3AF", fontFamily: "'DM Sans', sans-serif" }}>
                                    Simulate Client Reply
                                  </button>
                                </div>
                                <textarea value={replyText} onChange={(e) => setReplyText(e.target.value)} placeholder={"Type your " + replyChannel + " reply to " + fu.clientName + "..."}
                                  rows={2} style={{ width: "100%", padding: "10px 12px", border: "1px solid #D1D5DB", borderRadius: 10, fontSize: 13, color: "#111827", fontFamily: "'DM Sans', sans-serif", resize: "vertical", outline: "none", boxSizing: "border-box" }}
                                  onFocus={(e) => e.target.style.borderColor = "#2D5A27"}
                                  onBlur={(e) => e.target.style.borderColor = "#D1D5DB"}
                                  onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendFollowUpReply(fu.id); } }} />
                              </div>
                              <Btn icon="send" onClick={() => sendFollowUpReply(fu.id)} disabled={!replyText.trim()} style={{ height: 40 }}>Send</Btn>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ) : (
              <EmptyState icon="send" title="No active follow-ups" subtitle="Follow-up sequences start automatically when you convert an estimate to a quote" />
            )}}
          </div>

        </div>
        );
      };

      // TAB 2: Calendar
      const renderCalendarTab = () => {
        const year = calMonth.getFullYear();
        const month = calMonth.getMonth();
        const monthName = calMonth.toLocaleDateString("en-US", { month: "long", year: "numeric" });
        const todayStr = new Date().toISOString().split("T")[0];

        const getEventsForDay = (day) => {
          if (!day.current) return [];
          const dateStr = year + "-" + String(month + 1).padStart(2, "0") + "-" + String(day.day).padStart(2, "0");
          return calendarEvents.filter(ev => ev.date === dateStr);
        };

        const todayEvents = selectedDate
          ? calendarEvents.filter(ev => ev.date === selectedDate).sort((a, b) => a.time.localeCompare(b.time))
          : calendarEvents.filter(ev => {
              const evDate = new Date(ev.date);
              return evDate.getMonth() === month && evDate.getFullYear() === year;
            }).sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

        const upcomingEstimates = calendarEvents.filter(ev => ev.type === "Estimate Appt" || ev.type === "Site Visit").sort((a, b) => a.date.localeCompare(b.date));

        return (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
              <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#111827" }}>Calendar</h3>
              <Btn icon="plus" onClick={() => { setNewEvent({ ...newEvent, date: selectedDate || today() }); setShowNewEvent(true); }}>New Event</Btn>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 340px", gap: 16 }}>
              {/* Calendar Grid */}
              <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #E5E7EB", padding: 20 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <button onClick={() => setCalMonth(new Date(year, month - 1, 1))} style={{ background: "#F3F4F6", border: "1px solid #E5E7EB", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 13, fontWeight: 600, color: "#374151" }}>&#8592; Prev</button>
                  <h4 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: "#111827" }}>{monthName}</h4>
                  <button onClick={() => setCalMonth(new Date(year, month + 1, 1))} style={{ background: "#F3F4F6", border: "1px solid #E5E7EB", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 13, fontWeight: 600, color: "#374151" }}>Next &#8594;</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 1 }}>
                  {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map(d => (
                    <div key={d} style={{ textAlign: "center", padding: "8px 0", fontSize: 11, fontWeight: 700, color: "#6B7280", textTransform: "uppercase", letterSpacing: 0.5 }}>{d}</div>
                  ))}
                  {calendarDays.map((day, idx) => {
                    const dateStr = year + "-" + String(month + 1).padStart(2, "0") + "-" + String(day.day).padStart(2, "0");
                    const events = getEventsForDay(day);
                    const isToday = day.current && dateStr === todayStr;
                    const isSelected = day.current && dateStr === selectedDate;
                    return (
                      <div key={idx} onClick={() => day.current && setSelectedDate(dateStr === selectedDate ? null : dateStr)}
                        style={{
                          minHeight: 72, padding: "4px 6px", borderRadius: 8, cursor: day.current ? "pointer" : "default",
                          background: isSelected ? "#2D5A2710" : isToday ? "#FFF7ED" : day.current ? "#fff" : "#FAFAFA",
                          border: isSelected ? "2px solid #2D5A27" : isToday ? "2px solid #D4A843" : "1px solid #F3F4F6",
                          transition: "all 0.15s", opacity: day.current ? 1 : 0.4,
                        }}>
                        <div style={{ fontSize: 12, fontWeight: isToday || isSelected ? 800 : 500, color: isToday ? "#D4A843" : isSelected ? "#2D5A27" : day.current ? "#111827" : "#9CA3AF", marginBottom: 2 }}>{day.day}</div>
                        {events.slice(0, 3).map((ev, i) => (
                          <div key={i} style={{ fontSize: 9, padding: "1px 4px", borderRadius: 3, marginBottom: 1, background: (EVENT_COLORS[ev.type] || "#9CA3AF") + "20", color: EVENT_COLORS[ev.type] || "#6B7280", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ev.title.substring(0, 18)}</div>
                        ))}
                        {events.length > 3 && <div style={{ fontSize: 9, color: "#9CA3AF", fontWeight: 600 }}>+{events.length - 3} more</div>}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Sidebar */}
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #E5E7EB", padding: 16, maxHeight: 400, overflow: "auto" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                    <h4 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: "#111827" }}>{selectedDate ? formatDate(selectedDate) : "This Month"}</h4>
                    {selectedDate && <button onClick={() => setSelectedDate(null)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, color: "#6B7280", fontWeight: 600 }}>Show all</button>}
                  </div>
                  {todayEvents.length > 0 ? (
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {todayEvents.map(ev => {
                        const client = clients.find(c => c.id === ev.clientId);
                        return (
                          <div key={ev.id} style={{ padding: 10, background: "#F9FAFB", borderRadius: 10, borderLeft: "3px solid " + (EVENT_COLORS[ev.type] || "#9CA3AF") }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                              <span style={{ fontSize: 13, fontWeight: 600, color: "#111827" }}>{ev.title}</span>
                              <span style={{ fontSize: 11, color: "#D4A843", fontWeight: 700 }}>{ev.time}</span>
                            </div>
                            <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4 }}>
                              <Badge text={ev.type} color={EVENT_COLORS[ev.type] || "#9CA3AF"} />
                              {!selectedDate && <span style={{ fontSize: 10, color: "#9CA3AF" }}>{formatDate(ev.date)}</span>}
                            </div>
                            {ev.notes && <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.4 }}>{ev.notes}</div>}
                            {client && <div style={{ fontSize: 11, color: "#2D5A27", marginTop: 4, fontWeight: 600 }}>{client.name} — {client.address.split(",")[0]}</div>}
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    <div style={{ textAlign: "center", padding: 20, color: "#9CA3AF", fontSize: 13 }}>{selectedDate ? "No events this day" : "No events this month"}</div>
                  )}
                </div>
                <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #E5E7EB", padding: 16 }}>
                  <h4 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 700, color: "#111827" }}>Upcoming Estimates & Visits</h4>
                  {upcomingEstimates.length > 0 ? (
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {upcomingEstimates.slice(0, 6).map(ev => {
                        const client = clients.find(c => c.id === ev.clientId);
                        return (
                          <div key={ev.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", background: "#F9FAFB", borderRadius: 8, fontSize: 12 }}>
                            <div>
                              <div style={{ fontWeight: 600, color: "#111827" }}>{client?.name || ev.title}</div>
                              <div style={{ fontSize: 10, color: "#9CA3AF" }}>{ev.type}</div>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontWeight: 600, color: "#2D5A27" }}>{formatDate(ev.date)}</div>
                              <div style={{ fontSize: 10, color: "#D4A843" }}>{ev.time}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    <div style={{ textAlign: "center", padding: 16, color: "#9CA3AF", fontSize: 13 }}>No upcoming estimates</div>
                  )}
                </div>
                <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #E5E7EB", padding: 14 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#6B7280", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>Event Types</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {EVENT_TYPES.map(t => (
                      <span key={t} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11 }}>
                        <span style={{ width: 8, height: 8, borderRadius: 2, background: EVENT_COLORS[t], display: "inline-block" }} />{t}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // TAB 6: Pipeline (Kanban)
      const plFilteredLeads = pipelineLeads.filter(l => {
        const ms = !plSearch || l.name.toLowerCase().includes(plSearch.toLowerCase()) || l.project.toLowerCase().includes(plSearch.toLowerCase()) || l.id.toLowerCase().includes(plSearch.toLowerCase());
        const mp = plPriorityFilter === "all" || l.priority === plPriorityFilter;
        return ms && mp;
      });
      const plTotalValue = pipelineLeads.reduce((s, l) => s + l.value, 0);
      const priCfg = { high: { label: "High", color: "#dc2626", bg: "#fef2f2", border: "#fecaca" }, medium: { label: "Med", color: "#d97706", bg: "#fffbeb", border: "#fde68a" }, low: { label: "Low", color: "#2563eb", bg: "#eff6ff", border: "#bfdbfe" } };

      const renderPipelineTab = () => (
        <div>
          {/* Pipeline Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
            <div>
              <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#111827" }}>Pipeline</h3>
              <div style={{ fontSize: 12, color: "#6B7280", marginTop: 2 }}>Drag & drop leads between stages · {pipelineLeads.length} total leads · <span style={{ fontWeight: 700, color: "#2D5A27" }}>{formatCurrency(plTotalValue)}</span> pipeline value</div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <div style={{ position: "relative" }}>
                <input type="text" placeholder="Search leads..." value={plSearch} onChange={(e) => setPlSearch(e.target.value)} style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, padding: "8px 12px 8px 32px", borderRadius: 8, border: "1px solid #D1D5DB", background: "#fff", outline: "none", width: 190 }} />
                <div style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", pointerEvents: "none" }}><Icon name="search" size={14} color="#9CA3AF" /></div>
              </div>
              <select value={plPriorityFilter} onChange={(e) => setPlPriorityFilter(e.target.value)} style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, padding: "8px 12px", borderRadius: 8, border: "1px solid #D1D5DB", background: "#fff", outline: "none", cursor: "pointer" }}>
                <option value="all">All Priorities</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>

          {/* Stage Summary Bar */}
          <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #E5E7EB", padding: "14px 20px", marginBottom: 16, display: "flex", alignItems: "center", overflowX: "auto", gap: 0 }}>
            {PIPELINE_STAGES.map((stage, i) => {
              const sl = plFilteredLeads.filter(l => l.stage === stage.id);
              const sv = sl.reduce((s, l) => s + l.value, 0);
              return (
                <div key={stage.id} style={{ flex: 1, display: "flex", alignItems: "center", minWidth: 140 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1 }}>
                    <div style={{ width: 32, height: 32, borderRadius: "50%", background: stage.color + "15", border: "2px solid " + stage.color, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <Icon name={stage.icon} size={14} color={stage.color} />
                    </div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#111827" }}>{stage.label}</div>
                      <div style={{ fontSize: 11, color: "#6B7280" }}>{sl.length} leads · {formatCurrency(sv)}</div>
                    </div>
                  </div>
                  {i < PIPELINE_STAGES.length - 1 && <div style={{ color: "#D1D5DB", fontSize: 16, padding: "0 4px" }}>→</div>}
                </div>
              );
            })}
          </div>

          {/* Kanban Board */}
          <div style={{ display: "flex", gap: 12, overflowX: "auto", alignItems: "flex-start", paddingBottom: 20, minHeight: 420 }}>
            {PIPELINE_STAGES.map(stage => {
              const stageLeads = plFilteredLeads.filter(l => l.stage === stage.id);
              const stageTotal = stageLeads.reduce((s, l) => s + l.value, 0);
              const isOver = plDragOver === stage.id;
              return (
                <div key={stage.id}
                  onDragOver={(e) => { e.preventDefault(); setPlDragOver(stage.id); }}
                  onDragLeave={() => setPlDragOver(null)}
                  onDrop={(e) => { e.preventDefault(); const lid = e.dataTransfer.getData("text/plain"); setPipelineLeads(prev => prev.map(l => l.id === lid ? { ...l, stage: stage.id } : l)); setPlDragId(null); setPlDragOver(null); }}
                  style={{ flex: "1 1 0", minWidth: 230, maxWidth: 300, display: "flex", flexDirection: "column", background: isOver ? stage.color + "08" : "#fff", borderRadius: 14, border: isOver ? "2px dashed " + stage.color : "1px solid #E5E7EB", transition: "all 0.2s", overflow: "hidden" }}>
                  {/* Column Header */}
                  <div style={{ padding: "14px 14px 10px", borderBottom: "3px solid " + stage.color, background: stage.color + "08" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 2 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                        <div style={{ width: 30, height: 30, borderRadius: 8, background: stage.color + "15", display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <Icon name={stage.icon} size={15} color={stage.color} />
                        </div>
                        <span style={{ fontWeight: 800, fontSize: 14, color: "#111827" }}>{stage.label}</span>
                      </div>
                      <span style={{ background: stage.color, color: "#fff", borderRadius: 8, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>{stageLeads.length}</span>
                    </div>
                    <div style={{ fontSize: 10, color: "#6B7280", marginBottom: 4 }}>{stage.subtitle}</div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: stage.color }}>{formatCurrency(stageTotal)}</div>
                  </div>
                  {/* Cards */}
                  <div style={{ padding: 10, flex: 1, overflowY: "auto", minHeight: 100 }}>
                    {stageLeads.length === 0 && <div style={{ textAlign: "center", padding: "24px 10px", color: "#C5CFC5", fontSize: 12, fontStyle: "italic" }}>Drag leads here</div>}
                    {stageLeads.map(lead => {
                      const pri = priCfg[lead.priority];
                      const isDrag = plDragId === lead.id;
                      return (
                        <div key={lead.id} draggable
                          onDragStart={(e) => { setPlDragId(lead.id); e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", lead.id); }}
                          onDragEnd={() => { setPlDragId(null); setPlDragOver(null); }}
                          onClick={() => setPlSelectedLead(lead)}
                          style={{ background: "#fff", borderRadius: 10, padding: "12px 14px", marginBottom: 8, cursor: "grab", border: "1px solid #E5E7EB", boxShadow: isDrag ? "0 10px 24px rgba(45,90,39,0.15)" : "0 1px 3px rgba(0,0,0,0.04)", opacity: isDrag ? 0.5 : 1, transform: isDrag ? "rotate(-2deg) scale(1.03)" : "none", transition: "box-shadow 0.2s, transform 0.15s, opacity 0.15s", userSelect: "none" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                            <span style={{ fontWeight: 700, fontSize: 13, color: "#111827", lineHeight: 1.3 }}>{lead.name}</span>
                            <span style={{ fontSize: 9, fontWeight: 700, color: pri.color, background: pri.bg, border: "1px solid " + pri.border, borderRadius: 4, padding: "1px 6px", whiteSpace: "nowrap" }}>{pri.label}</span>
                          </div>
                          <div style={{ fontSize: 12, color: "#6B7280", marginBottom: 5 }}>{lead.project}</div>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <span style={{ fontFamily: "monospace", fontSize: 13, fontWeight: 700, color: "#2D5A27" }}>{formatCurrency(lead.value)}</span>
                            <span style={{ fontSize: 10, color: "#9CA3AF" }}>{lead.id} · {lead.date}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Lead Detail Modal */}
          {plSelectedLead && (
            <div onClick={() => setPlSelectedLead(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
              <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", borderRadius: 16, width: "90%", maxWidth: 480, boxShadow: "0 24px 60px rgba(0,0,0,0.18)", overflow: "hidden" }}>
                {(() => {
                  const lead = plSelectedLead;
                  const cs = PIPELINE_STAGES.find(s => s.id === lead.stage);
                  const pri = priCfg[lead.priority];
                  return (
                    <Fragment>
                      <div style={{ background: cs?.color || "#2D5A27", padding: "18px 22px", color: "#fff" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div>
                            <div style={{ fontSize: 10, opacity: 0.8, letterSpacing: 1, textTransform: "uppercase", marginBottom: 3 }}>{lead.id}</div>
                            <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.3 }}>{lead.name}</div>
                          </div>
                          <button onClick={() => setPlSelectedLead(null)} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", width: 30, height: 30, borderRadius: 8, cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
                        </div>
                      </div>
                      <div style={{ padding: "18px 22px" }}>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>

                          <div><div style={{ fontSize: 10, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>Value</div><div style={{ fontSize: 18, fontWeight: 700, color: "#2D5A27", fontFamily: "monospace" }}>{formatCurrency(lead.value)}</div></div>
                          <div><div style={{ fontSize: 10, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>Phone</div><div style={{ fontSize: 14, color: "#111827" }}>{lead.phone}</div></div>
                          <div><div style={{ fontSize: 10, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>Address</div><div style={{ fontSize: 14, color: "#111827" }}>{lead.address}</div></div>
                        </div>
                        <div style={{ marginBottom: 14 }}>
                          <div style={{ fontSize: 10, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>Priority</div>
                          <span style={{ fontSize: 11, fontWeight: 700, color: pri.color, background: pri.bg, border: "1px solid " + pri.border, borderRadius: 6, padding: "3px 10px" }}>{pri.label} Priority</span>
                        </div>
                        <div style={{ marginBottom: 16 }}>
                          <div style={{ fontSize: 10, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>Notes</div>
                          <div style={{ fontSize: 13, color: "#374151", background: "#F9FAFB", borderRadius: 8, padding: "10px 12px", lineHeight: 1.5 }}>{lead.notes}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: 10, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Move to Stage</div>
                          <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                            {PIPELINE_STAGES.map(s => (
                              <button key={s.id} onClick={() => { setPipelineLeads(prev => prev.map(l => l.id === lead.id ? { ...l, stage: s.id } : l)); setPlSelectedLead({ ...lead, stage: s.id }); }}
                                style={{ fontSize: 12, fontWeight: lead.stage === s.id ? 700 : 500, color: lead.stage === s.id ? "#fff" : s.color, background: lead.stage === s.id ? s.color : s.color + "12", border: "1.5px solid " + s.color, borderRadius: 8, padding: "5px 12px", cursor: "pointer", transition: "all 0.15s", fontFamily: "'DM Sans', sans-serif" }}>
                                {s.label}
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    </Fragment>
                  );
                })()}
              </div>
            </div>
          )}

      const renderHubTab = () => (

            {clients.map((c) => (
              <div key={c.id} style={{ background: "#fff", borderRadius: 14, border: "1px solid #E5E7EB", padding: 18 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>

                  <Badge text={c.projectStatus} color={STATUS_COLORS[c.projectStatus]} />
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  <Btn size="sm" variant="secondary" icon="users" onClick={() => setSelectedClient(c)}>Client Profile</Btn>
                  <Btn size="sm" variant="secondary" icon="chat" onClick={() => { setNewComm({ ...newComm, clientId: c.id }); setActiveTab(2); }}>Communications</Btn>
                  <Btn size="sm" variant="secondary" icon="dollar" onClick={() => setActiveTab(3)}>Financials</Btn>
                  <Btn size="sm" variant="secondary" icon="clipboard" onClick={() => { setEstimateClient(c); setShowEstimateModal(true); }}>Estimate</Btn>
                  <Btn size="sm" variant="secondary" icon="folder" onClick={() => window.open(c.driveLink)}>Drive Folder</Btn>
                  <Btn size="sm" variant="secondary" icon="map" onClick={() => window.open("https://maps.google.com/?q=" + encodeURIComponent(c.address))}>Map</Btn>
                  <Btn size="sm" variant="secondary" icon="phone" onClick={() => window.open("tel:" + c.phone)}>Call</Btn>
                  <Btn size="sm" variant="secondary" icon="mail" onClick={() => window.open("mailto:" + c.email)}>Email</Btn>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      // TAB 7: Team & Users
      const renderTeamTab = () => {
        const handleAddTeamUser = () => {
          if (!newTeamUser.name || !newTeamUser.username || !newTeamUser.password) return;
          addUser({ id: "u" + generateId(), ...newTeamUser, email: newTeamUser.email || "", phone: newTeamUser.phone || "", created: today(), status: "Active" });
          setNewTeamUser({ name: "", username: "", password: "", email: "", phone: "", role: "Crew Member" });
          setShowAddUser(false);

        const STATUS_BADGE = { Active: "#10B981", Pending: "#F59E0B", Inactive: "#EF4444" };

        return (

              <div>
                <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#111827" }}>Team & User Management</h3>
                <p style={{ fontSize: 13, color: "#6B7280", marginTop: 2 }}>Add users, assign roles, and manage access</p>
              </div>
              <Btn icon="plus" onClick={() => setShowAddUser(true)}>Add User</Btn>
            </div>

            {/* Stats */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12, marginBottom: 20 }}>
              <StatCard icon="users" label="Total Users" value={users.length} accent="#2D5A27" />
              <StatCard icon="check" label="Active" value={users.filter(u => u.status === "Active").length} accent="#10B981" />
              <StatCard icon="clock" label="Pending" value={users.filter(u => u.status === "Pending").length} accent="#F59E0B" />
              <StatCard icon="x" label="Inactive" value={users.filter(u => u.status === "Inactive").length} accent="#EF4444" />
            </div>

            {/* Users Table */}
            <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #E5E7EB", overflow: "hidden", marginBottom: 20 }}>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr style={{ background: "#F9FAFB" }}>
                      {["User", "Username", "Role", "Email", "Status", "Created", "Actions"].map(h => (
                        <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontWeight: 600, color: "#6B7280", fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, borderBottom: "1px solid #E5E7EB", whiteSpace: "nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {users.map(u => (
                      <tr key={u.id} style={{ borderBottom: "1px solid #F3F4F6" }}>
                        <td style={{ padding: "10px 14px" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ width: 32, height: 32, borderRadius: 8, background: u.status === "Active" ? "linear-gradient(135deg, #2D5A27, #4A8C3F)" : "#E5E7EB", display: "flex", alignItems: "center", justifyContent: "center", color: u.status === "Active" ? "#fff" : "#9CA3AF", fontWeight: 700, fontSize: 12 }}>{u.name?.charAt(0)}</div>
                            <div>
                              <div style={{ fontWeight: 600, color: "#111827" }}>{u.name}</div>
                              {u.phone && <div style={{ fontSize: 11, color: "#9CA3AF" }}>{u.phone}</div>}
                            </div>
                          </div>
                        </td>
                        <td style={{ padding: "10px 14px", fontFamily: "monospace", fontSize: 12, color: "#6B7280" }}>{u.username}</td>
                        <td style={{ padding: "10px 14px" }}>
                          {editingUser === u.id ? (
                            <select value={u.role} onChange={(e) => { updateUser(u.id, { role: e.target.value }); setEditingUser(null); }} style={{ padding: "4px 8px", border: "1px solid #D1D5DB", borderRadius: 6, fontSize: 12, background: "#fff" }}>
                              {ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                          ) : (
                            <span onClick={() => currentUser?.role === "Owner" && setEditingUser(u.id)} style={{ cursor: currentUser?.role === "Owner" ? "pointer" : "default", padding: "3px 8px", borderRadius: 6, background: u.role === "Owner" ? "#2D5A2715" : "#F3F4F6", fontSize: 12, fontWeight: 600, color: u.role === "Owner" ? "#2D5A27" : "#374151" }}>{u.role}</span>
                          )}
                        </td>
                        <td style={{ padding: "10px 14px", fontSize: 12, color: "#6B7280" }}>{u.email}</td>
                        <td style={{ padding: "10px 14px" }}><Badge text={u.status} color={STATUS_BADGE[u.status] || "#9CA3AF"} /></td>
                        <td style={{ padding: "10px 14px", fontSize: 12, color: "#9CA3AF" }}>{u.created ? formatDate(u.created) : "—"}</td>
                        <td style={{ padding: "10px 14px" }}>
                          <div style={{ display: "flex", gap: 4 }}>
                            {u.status === "Pending" && (
                              <Btn size="sm" variant="success" onClick={() => updateUser(u.id, { status: "Active" })}>Approve</Btn>
                            )}
                            {u.status === "Active" && u.id !== currentUser?.id && (
                              <Btn size="sm" variant="secondary" onClick={() => updateUser(u.id, { status: "Inactive" })}>Deactivate</Btn>
                            )}
                            {u.status === "Inactive" && (
                              <Btn size="sm" variant="secondary" onClick={() => updateUser(u.id, { status: "Active" })}>Reactivate</Btn>
                            )}
                            {u.id !== currentUser?.id && currentUser?.role === "Owner" && (
                              <Btn size="sm" variant="danger" onClick={() => { if(confirm("Remove " + u.name + "?")) removeUser(u.id); }}>Remove</Btn>
                            )}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ background: "#F9FAFB" }}>
                      <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 600, color: "#6B7280", fontSize: 11, borderBottom: "1px solid #E5E7EB" }}>Role</th>
                      {["Clients", "Calendar", "Comms", "Finance", "Estimating", "Hub", "Team Mgmt"].map(h => (
                        <th key={h} style={{ padding: "8px 10px", textAlign: "center", fontWeight: 600, color: "#6B7280", fontSize: 10, textTransform: "uppercase", letterSpacing: 0.3, borderBottom: "1px solid #E5E7EB" }}>{h}</th>

                    </tr>
                  </thead>
                  <tbody>
                    {ROLES.map(role => {
                      const access = ROLE_ACCESS[role] || {};
                      return (
                        <tr key={role} style={{ borderBottom: "1px solid #F3F4F6" }}>
                          <td style={{ padding: "8px 12px", fontWeight: 600, color: "#111827" }}>{role}</td>
                          {["clients", "calendar", "comms", "finance", "estimating", "hub", "team"].map(k => (
                            <td key={k} style={{ padding: "8px 10px", textAlign: "center" }}>
                              {access[k]
                                ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10B981" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                                : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E5E7EB" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                              }
                            </td>
                          ))}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      const tabContent = [renderClientsTab, renderCalendarTab, renderCommsTab, renderFinanceTab, renderEstimateTab, renderPipelineTab, renderHubTab, ...(currentUser?.role === "Owner" || currentUser?.role === "Office Manager" ? [renderTeamTab] : [])];

      return (
        <div style={{ fontFamily: "'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif", background: "#F5F6F8", minHeight: "100vh", color: "#111827" }}>
          {/* Top Bar */}
          <header style={{ background: "#fff", borderBottom: "1px solid #E5E7EB", padding: "0 24px", height: 68, display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 100 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <TreeLogo />
                <div style={{ width: 1, height: 36, background: "#E5E7EB" }} />
                <div>
                  <div style={{ fontSize: 17, fontWeight: 800, color: "#111827", letterSpacing: -0.3, fontFamily: "'Playfair Display', serif" }}>MLC Group <span style={{ color: "#D4A843", fontWeight: 800 }}>—</span> <span style={{ color: "#2D5A27" }}>CRM 1.0</span></div>
                  <div style={{ fontSize: 10, color: "#9CA3AF", letterSpacing: 1.2, textTransform: "uppercase", fontWeight: 600 }}>Brick Patios · Patio Restoration · Yard Drainage</div>
                </div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <a href="https://www.mylandscapecontractor.com" target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, color: "#2D5A27", textDecoration: "none", fontWeight: 600, padding: "6px 12px", background: "#F0FDF4", borderRadius: 8, border: "1px solid #BBF7D0" }}>
                <span style={{ display: "flex", alignItems: "center", gap: 4 }}><Icon name="link" size={12} color="#2D5A27" />mylandscapecontractor.com</span>
              </a>
              <Btn size="sm" variant="secondary" icon="refresh">Sync</Btn>
              <div style={{ width: 1, height: 24, background: "#E5E7EB" }} />
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 32, height: 32, borderRadius: 10, background: "linear-gradient(135deg, #2D5A27, #4A8C3F)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: 12 }}>{currentUser?.name?.charAt(0) || "U"}</div>
                <div style={{ lineHeight: 1.2 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#111827" }}>{currentUser?.name}</div>
                  <div style={{ fontSize: 10, color: "#9CA3AF" }}>{currentUser?.role}</div>
                </div>
                <button onClick={onLogout} title="Sign out" style={{ background: "none", border: "none", cursor: "pointer", padding: 4, marginLeft: 4 }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
              </div>
            </div>
          </header>

          <div style={{ display: "flex", maxWidth: 1400, margin: "0 auto" }}>
            {/* Sidebar */}
            <nav style={{ width: 220, background: "#fff", borderRight: "1px solid #E5E7EB", minHeight: "calc(100vh - 68px)", padding: "16px 0", flexShrink: 0 }}>
              {tabs.map((t, i) => (
                <button key={i} onClick={() => { setActiveTab(i); setMobileNav(false); }}
                  style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "11px 20px", border: "none", background: activeTab === i ? "#2D5A2710" : "transparent", color: activeTab === i ? "#2D5A27" : "#6B7280", cursor: "pointer", fontSize: 13, fontWeight: activeTab === i ? 700 : 500, borderLeft: activeTab === i ? "3px solid #2D5A27" : "3px solid transparent", transition: "all 0.1s", textAlign: "left" }}>
                  <Icon name={t.icon} size={17} color={activeTab === i ? "#2D5A27" : "#9CA3AF"} />
                  {t.label}
                </button>
              ))}
              <div style={{ margin: "16px 20px 8px", padding: "12px", background: "linear-gradient(135deg, rgba(45,90,39,0.06), rgba(212,168,67,0.06))", borderRadius: 10, border: "1px solid rgba(212,168,67,0.19)", textAlign: "center" }}>
                <div style={{ fontSize: 18, fontWeight: 800, fontFamily: "'Playfair Display', serif", color: "#2D5A27" }}>MLC <span style={{ color: "#D4A843" }}>Group</span></div>
              </div>
              <div style={{ margin: "8px 20px 0", padding: "14px", background: "#F0FDF4", borderRadius: 10, border: "1px solid #BBF7D0" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#2D5A27", marginBottom: 4 }}>QUICK ADD</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <Btn size="sm" variant="ghost" icon="plus" onClick={() => setShowNewClient(true)} style={{ justifyContent: "flex-start", color: "#374151" }}>New Client</Btn>
                  <Btn size="sm" variant="ghost" icon="calendar" onClick={() => { setNewEvent({ ...newEvent, type: "Estimate Appt" }); setShowNewEvent(true); }} style={{ justifyContent: "flex-start", color: "#374151" }}>Book Estimate</Btn>
                  <Btn size="sm" variant="ghost" icon="chat" onClick={() => setShowNewComm(true)} style={{ justifyContent: "flex-start", color: "#374151" }}>Log Communication</Btn>
                  <Btn size="sm" variant="ghost" icon="clock" onClick={() => setShowTimesheetModal(true)} style={{ justifyContent: "flex-start", color: "#374151" }}>Add Timesheet</Btn>
                </div>
              </div>
            </nav>

            {/* Main Content */}
            <main style={{ flex: 1, padding: 24, minWidth: 0 }}>
              {tabContent[activeTab]()}
            </main>
          </div>

          {/* Modals */}
          <Modal open={showNewClient} onClose={() => setShowNewClient(false)} title="Add New Client">
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div><Label>Client Name *</Label><Input value={newClient.name} onChange={(v) => setNewClient({ ...newClient, name: v })} placeholder="Full name" /></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><Label>Phone</Label><Input value={newClient.phone} onChange={(v) => setNewClient({ ...newClient, phone: v })} placeholder="(847) 555-0000" /></div>
                <div><Label>Email</Label><Input value={newClient.email} onChange={(v) => setNewClient({ ...newClient, email: v })} placeholder="email@example.com" /></div>
              </div>
              <div><Label>Project Address</Label><Input value={newClient.address} onChange={(v) => setNewClient({ ...newClient, address: v })} placeholder="Full street address" /></div>
              <div><Label>Lead Source</Label><Select value={newClient.leadSource} onChange={(v) => setNewClient({ ...newClient, leadSource: v })} options={LEAD_SOURCES} placeholder="Select source..." /></div>
              <div><Label>Project Description / Notes</Label><Textarea value={newClient.description} onChange={(v) => setNewClient({ ...newClient, description: v })} placeholder="Describe the project..." /></div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 8 }}><Btn variant="secondary" onClick={() => setShowNewClient(false)}>Cancel</Btn><Btn onClick={handleAddClient} disabled={!newClient.name}>Create Client</Btn></div>
            </div>
          </Modal>

          <Modal open={showNewComm} onClose={() => setShowNewComm(false)} title="Log Communication">
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div><Label>Client</Label>
                <select value={newComm.clientId} onChange={(e) => setNewComm({ ...newComm, clientId: e.target.value })} style={{ width: "100%", padding: "8px 12px", border: "1px solid #D1D5DB", borderRadius: 8, fontSize: 13, color: newComm.clientId ? "#111827" : "#9CA3AF", background: "#fff", cursor: "pointer" }}>
                  <option value="">Select client...</option>
                  {clients.map((c) => <option key={c.id} value={c.id}>{c.name} — {c.address}</option>)}
                </select>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><Label>Date</Label><Input type="date" value={newComm.date} onChange={(v) => setNewComm({ ...newComm, date: v })} /></div>
                <div><Label>Contact Type</Label><Select value={newComm.type} onChange={(v) => setNewComm({ ...newComm, type: v })} options={CONTACT_TYPES} /></div>
              </div>
              <div><Label>Note Summary *</Label><Textarea value={newComm.note} onChange={(v) => setNewComm({ ...newComm, note: v })} placeholder="Brief description of the conversation..." rows={4} /></div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 8 }}><Btn variant="secondary" onClick={() => setShowNewComm(false)}>Cancel</Btn><Btn onClick={handleAddComm} disabled={!newComm.clientId || !newComm.note}>Save Entry</Btn></div>
            </div>
          </Modal>

          <Modal open={showEmailModal} onClose={() => setShowEmailModal(false)} title="Send Preset Email/Text">

                {/* Record / Stop Button */}
                <div style={{ display: "flex", gap: 12, justifyContent: "center", alignItems: "center" }}>
                  {!isRecording && !voiceSummary && (
                    <button onClick={() => startRecording(voiceClientId)}
                      style={{ width: 64, height: 64, borderRadius: "50%", background: "linear-gradient(135deg, #DC2626, #B91C1C)", border: "4px solid #FEE2E2", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 20px rgba(220,38,38,0.3)", transition: "all 0.2s" }}>
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff" stroke="none"><circle cx="12" cy="12" r="8"/></svg>
                    </button>
                  )}
                  {isRecording && (
                    <button onClick={stopRecording}
                      style={{ width: 64, height: 64, borderRadius: "50%", background: "linear-gradient(135deg, #374151, #111827)", border: "4px solid #E5E7EB", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 20px rgba(0,0,0,0.2)", transition: "all 0.2s" }}>
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff" stroke="none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                    </button>
                  )}
                </div>

                <div style={{ fontSize: 12, color: "#9CA3AF", marginTop: 10 }}>
                  {isRecording ? "Recording... Speak clearly about the site visit" : voiceSummary ? "" : "Tap to start recording your voice note"}
                </div>
              </div>

              {/* Live Transcript */}
              {(transcript || isRecording) && (
                <div>
                  <Label>Live Transcript</Label>
                  <div style={{ padding: 14, background: "#F9FAFB", borderRadius: 10, border: "1px solid #E5E7EB", fontSize: 13, color: "#374151", lineHeight: 1.6, minHeight: 60, maxHeight: 140, overflowY: "auto", position: "relative" }}>
                    {transcript || <span style={{ color: "#9CA3AF", fontStyle: "italic" }}>Listening...</span>}
                    {isRecording && <span style={{ display: "inline-block", width: 8, height: 16, background: "#DC2626", marginLeft: 2, animation: "blink 1s infinite" }} />}
                  </div>
                </div>
              )}

              {/* Generate Summary Button */}
              {!isRecording && transcript && !voiceSummary && (
                <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
                  <Btn variant="secondary" onClick={() => { setTranscript(""); setRecordingTime(0); }}>Discard & Re-record</Btn>
                  <Btn icon="check" onClick={() => generateVoiceSummary(transcript)} disabled={isTranscribing}>
                    {isTranscribing ? "Generating Summary..." : "Generate Summary"}
                  </Btn>
                </div>
              )}

              {/* Generated Summary */}
              {voiceSummary && (
                <div>
                  <div style={{ padding: 20, background: "#fff", borderRadius: 14, border: "1px solid #E5E7EB", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
                    {/* Summary Header */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, paddingBottom: 12, borderBottom: "1px solid #F3F4F6" }}>
                      <div>
                        <div style={{ fontSize: 16, fontWeight: 800, color: "#111827" }}>Site Visit Summary</div>
                        <div style={{ fontSize: 12, color: "#9CA3AF", marginTop: 2 }}>{voiceSummary.client} · {voiceSummary.address} · {formatDate(voiceSummary.date)}</div>
                      </div>
                      <Badge text="Voice Note" color="#DC2626" />
                    </div>

                    {/* Sections */}
                    {voiceSummary.sections.map((section, idx) => (
                      <div key={idx} style={{ marginBottom: 14 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                          <div style={{ width: 26, height: 26, borderRadius: 7, background: "#2D5A2712", display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <Icon name={section.icon} size={13} color="#2D5A27" />
                          </div>
                          <span style={{ fontSize: 13, fontWeight: 700, color: "#111827", textTransform: "uppercase", letterSpacing: 0.5 }}>{section.title}</span>
                        </div>
                        <div style={{ paddingLeft: 34 }}>
                          {section.points.map((point, pi) => (
                            <div key={pi} style={{ display: "flex", gap: 8, marginBottom: 5, fontSize: 13, color: "#374151", lineHeight: 1.5 }}>
                              <span style={{ color: "#2D5A27", fontWeight: 700, flexShrink: 0 }}>•</span>
                              <span>{point}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}

                    {/* Action Items */}
                    {voiceSummary.actionItems.length > 0 && (
                      <div style={{ marginTop: 14, padding: 14, background: "#FFFBEB", borderRadius: 10, border: "1px solid #FDE68A" }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#D97706", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Action Items</div>
                        {voiceSummary.actionItems.map((item, ai) => (
                          <div key={ai} style={{ display: "flex", alignItems: "flex-start", gap: 8, marginBottom: 4, fontSize: 13, color: "#92400E" }}>
                            <span style={{ flexShrink: 0 }}>☐</span>
                            <span>{item}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 14 }}>
                    <Btn variant="secondary" onClick={() => { setVoiceSummary(null); setTranscript(""); setRecordingTime(0); }}>Discard</Btn>
                    <Btn icon="check" onClick={saveVoiceNote}>Save to Communications</Btn>
                  </div>
                </div>
              )}
            </div>
          </Modal>
        </div>
      );
    }

    // App Wrapper with Auth
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [users, setUsers] = useState(DEFAULT_USERS);

      const addUser = (user) => setUsers([...users, user]);
      const updateUser = (userId, updates) => setUsers(users.map(u => u.id === userId ? { ...u, ...updates } : u));
      const removeUser = (userId) => setUsers(users.filter(u => u.id !== userId));

      if (!currentUser) {
        return <LoginPage onLogin={setCurrentUser} users={users} onRegister={addUser} />;
      }

      return <MLCCRM currentUser={currentUser} onLogout={() => setCurrentUser(null)} users={users} addUser={addUser} updateUser={updateUser} removeUser={removeUser} />;
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
